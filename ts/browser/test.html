<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiIme — Pipeline Test</title>
<style>
  :root {
    --bg: #16162a; --bg2: #222232; --fg: #dcdcf0; --fg-dim: #78789b;
    --border: #373755; --green: #5ac86e; --blue: #5a96ff; --yellow: #ffc34b;
    --hover: #30446c; --accent: #5b8cff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Meiryo UI', 'Yu Gothic', sans-serif;
    background: var(--bg); color: var(--fg);
    display: flex; justify-content: center; padding: 40px 16px;
  }
  .container { max-width: 700px; width: 100%; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: var(--fg-dim); font-size: 13px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; color: var(--fg-dim); margin-bottom: 6px; }
  textarea {
    width: 100%; height: 80px; background: var(--bg2); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; padding: 10px;
    font-size: 15px; resize: vertical; font-family: inherit;
  }
  textarea:focus { outline: 1px solid var(--accent); }
  .btn-row { display: flex; gap: 8px; margin: 12px 0; }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 8px 20px; font-size: 14px; cursor: pointer; font-family: inherit;
  }
  button:hover { opacity: .85; }
  button.secondary { background: var(--hover); }
  button:disabled { opacity: .4; cursor: not-allowed; }

  .result-box {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-top: 16px; display: none;
  }
  .result-box.visible { display: block; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 12px; font-weight: bold; margin-right: 6px;
  }
  .badge.custom  { background: var(--green); color: #000; }
  .badge.builtin { background: var(--blue);  color: #fff; }
  .badge.romaji  { background: var(--yellow); color: #000; }
  .badge.api     { background: var(--yellow); color: #000; }
  .badge.local   { background: var(--fg-dim);  color: #000; }

  .meta { font-size: 12px; color: var(--fg-dim); margin-bottom: 10px; }
  .converted-line { font-size: 16px; margin-bottom: 12px; }
  .converted-line .arrow { color: var(--fg-dim); margin: 0 8px; }
  .c-btn {
    display: block; width: 100%; text-align: left; padding: 8px 12px;
    margin: 4px 0; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--fg); cursor: pointer; font-size: 14px;
  }
  .c-btn:hover { background: var(--hover); }
  .c-btn .num { color: var(--accent); font-weight: bold; margin-right: 8px; }
  .intent-line { font-size: 13px; color: var(--fg-dim); margin-bottom: 8px; }

  .presets { margin-bottom: 16px; }
  .presets span {
    display: inline-block; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 10px; margin: 4px 4px 0 0; font-size: 12px;
    cursor: pointer; color: var(--fg-dim);
  }
  .presets span:hover { color: var(--fg); border-color: var(--accent); }

  .log-box {
    background: #0e0e1a; border: 1px solid var(--border); border-radius: 6px;
    padding: 12px; margin-top: 16px; font-size: 12px; color: var(--fg-dim);
    max-height: 200px; overflow-y: auto; white-space: pre-wrap; display: none;
  }
  .log-box.visible { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>AiIme — Pipeline Test</h1>
  <p class="subtitle">Replicates the C# Pipeline in pure JavaScript (dictionary + romaji conversion)</p>

  <label>Input text (romaji / Japanese / English)</label>
  <textarea id="input" placeholder="e.g. じんこうちのう、kikai gakushuu、design pattern..."></textarea>

  <div class="presets">
    <span onclick="setInput('じんこうちのう')">じんこうちのう</span>
    <span onclick="setInput('せっきゃく')">せっきゃく</span>
    <span onclick="setInput('kikai gakushuu')">kikai gakushuu</span>
    <span onclick="setInput('deproi')">deproi</span>
    <span onclick="setInput('とうきょう')">とうきょう</span>
    <span onclick="setInput('design pattern')">design pattern</span>
    <span onclick="setInput('sha')">sha</span>
    <span onclick="setInput('tsukutte')">tsukutte</span>
    <span onclick="setInput('hello world')">hello world</span>
  </div>

  <div class="btn-row">
    <button id="runBtn" onclick="runPipeline()">Run Pipeline</button>
    <button class="secondary" onclick="showLog()">Toggle Log</button>
  </div>

  <div class="result-box" id="result">
    <div class="meta" id="meta"></div>
    <div class="converted-line" id="converted"></div>
    <div class="intent-line" id="intent" style="display:none"></div>
    <div id="completions"></div>
  </div>

  <div class="log-box" id="logBox"></div>
</div>

<script>
// ─── Romaji → Hiragana Table (from RomajiConverter.cs) ───────────────────────
const TABLE = [

  ["tsu","つ"],["ttsu","っつ"],["dzu","づ"],["dji","ぢ"],
  ["kya","きゃ"],["kyu","きゅ"],["kyo","きょ"],
  ["gya","ぎゃ"],["gyu","ぎゅ"],["gyo","ぎょ"],
  ["sya","しゃ"],["syu","しゅ"],["syo","しょ"],
  ["zya","じゃ"],["zyu","じゅ"],["zyo","じょ"],
  ["jya","じゃ"],["jyu","じゅ"],["jyo","じょ"],
  ["ja","じゃ"],["ji","じ"],["ju","じゅ"],["je","じぇ"],["jo","じょ"],
  ["tya","ちゃ"],["tyu","ちゅ"],["tyo","ちょ"],
  ["nya","にゃ"],["nyu","にゅ"],["nyo","にょ"],
  ["hya","ひゃ"],["hyu","ひゅ"],["hyo","ひょ"],
  ["mya","みゃ"],["myu","みゅ"],["myo","みょ"],
  ["rya","りゃ"],["ryu","りゅ"],["ryo","りょ"],
  ["bya","びゃ"],["byu","びゅ"],["byo","びょ"],
  ["pya","ぴゃ"],["pyu","ぴゅ"],["pyo","ぴょ"],
  ["dya","ぢゃ"],["dyu","ぢゅ"],["dyo","ぢょ"],
  ["fa","ふぁ"],["fi","ふぃ"],["fu","ふ"],["fe","ふぇ"],["fo","ふぉ"],
  ["va","ゔぁ"],["vi","ゔぃ"],["vu","ゔ"],["ve","ゔぇ"],["vo","ゔぉ"],
  ["thi","てぃ"],["tha","てゃ"],["thu","てゅ"],["tho","てょ"],
  ["dhi","でぃ"],["dha","でゃ"],["dhu","でゅ"],["dho","でょ"],
  ["twi","とぅぃ"],["twu","とぅ"],["dwi","どぅぃ"],["dwu","どぅ"],
  ["whi","うぃ"],["whe","うぇ"],["who","うぉ"],
  ["ka","か"],["ki","き"],["ku","く"],["ke","け"],["ko","こ"],
  ["ga","が"],["gi","ぎ"],["gu","ぐ"],["ge","げ"],["go","ご"],
  ["sa","さ"],["si","し"],["su","す"],["se","せ"],["so","そ"],
  ["za","ざ"],["zi","じ"],["zu","ず"],["ze","ぜ"],["zo","ぞ"],
  ["ta","た"],["ti","ち"],["tu","つ"],["te","て"],["to","と"],
  ["da","だ"],["di","ぢ"],["du","づ"],["de","で"],["do","ど"],
  ["na","な"],["ni","に"],["nu","ぬ"],["ne","ね"],["no","の"],
  ["ha","は"],["hi","ひ"],["hu","ふ"],["he","へ"],["ho","ほ"],
  ["ba","ば"],["bi","び"],["bu","ぶ"],["be","べ"],["bo","ぼ"],
  ["pa","ぱ"],["pi","ぴ"],["pu","ぷ"],["pe","ぺ"],["po","ぽ"],
  ["ma","ま"],["mi","み"],["mu","む"],["me","め"],["mo","も"],
  ["ya","や"],["yu","ゆ"],["yo","よ"],
  ["ra","ら"],["ri","り"],["ru","る"],["re","れ"],["ro","ろ"],
  ["wa","わ"],["wi","うぃ"],["we","うぇ"],["wo","を"],
  ["la","ら"],["li","り"],["lu","る"],["le","れ"],["lo","ろ"],
  ["a","あ"],["i","い"],["u","う"],["e","え"],["o","お"],
  ["xa","ぁ"],["xi","ぃ"],["xu","ぅ"],["xe","ぇ"],["xo","ぉ"],
  ["xtu","っ"],["xtsu","っ"],["xya","ゃ"],["xyu","ゅ"],["xyo","ょ"],
  ["ltu","っ"],["ltsu","っ"],
];

const VOWELS_Y = new Set("aeiouAEIOUyY");

function toHiragana(input) {
  return input.split(' ').map(convertToken).join('').trimStart();
}

function convertToken(src) {
  src = src.toLowerCase();
  let sb = '', i = 0;
  while (i < src.length) {
    // 促音: 子音連続 (ss, kk, tt...)
    if (i + 1 < src.length && src[i] !== 'n' && src[i] === src[i+1] && !"aiueo".includes(src[i])) {
      sb += 'っ'; i++; continue;
    }
    // n + 非母音 → ん
    if (src[i] === 'n' && (i + 1 >= src.length || !VOWELS_Y.has(src[i+1]))) {
      sb += 'ん'; i++; continue;
    }
    // テーブル照合
    let matched = false;
    for (const [r, h] of TABLE) {
      if (src.length - i >= r.length && src.substring(i, i + r.length) === r) {
        sb += h; i += r.length; matched = true; break;
      }
    }
    if (!matched) { sb += src[i]; i++; }
  }
  return sb;
}

// ─── Builtin Dictionary (from BuiltinDict.cs) ────────────────────────────────
const BUILTIN = {

  "へいめんず":["平面図"],"りつめんず":["立面図"],"だんめんず":["断面図"],
  "きそ":["基礎"],"こうじ":["工事","公示"],"げんば":["現場"],
  "げんばかんり":["現場管理"],"かんり":["管理"],"せっけい":["設計"],
  "こうぞう":["構造"],"ないそう":["内装"],"がいそう":["外装"],
  "はいかん":["配管"],"でんき":["電気"],"くうちょう":["空調"],
  "しゅうぜん":["修繕"],"かいしゅう":["改修"],"ぞうちく":["増築"],
  "かいちく":["改築"],"けんちくし":["建築士"],"しゅんこう":["竣工"],
  "てっこつ":["鉄骨"],"てっきん":["鉄筋"],"こんくりーと":["コンクリート"],
  "もるたる":["モルタル"],"やね":["屋根"],"かべ":["壁"],
  "ゆか":["床"],"てんじょう":["天井"],"まど":["窓"],
  "かいだん":["階段","怪談"],"えれべーたー":["エレベーター"],
  "ぼうかへき":["防火壁"],"ぼいらー":["ボイラー"],
  "じんこうちのう":["人工知能"],"きかいがくしゅう":["機械学習"],
  "せいせいえーあい":["生成AI"],"えーあい":["AI"],
  "くらうど":["クラウド"],"さーばー":["サーバー","サーバ"],
  "でーたべーす":["データベース"],"あぴー":["API"],
  "ふれーむわーく":["フレームワーク"],"らいぶらりー":["ライブラリー","ライブラリ"],
  "べくとるけんさく":["ベクトル検索"],"えんべでぃんぐ":["エンベディング"],
  "ふぁいあべーす":["Firebase"],"ふぁいあすとあ":["Firestore"],
  "ばーてっくすえーあい":["Vertex AI"],"じーしーぴー":["GCP"],
  "りあくと":["React"],"のーどじぇいえす":["Node.js"],
  "たいぷすくりぷと":["TypeScript"],"ぱいそん":["Python"],
  "しーしゃーぷ":["C#"],"くとる":["Ktor"],"ごどー":["Godot"],
  "でぷろい":["デプロイ"],"りぽじとり":["リポジトリ"],
  "こみっと":["コミット"],"ぷるりくえすと":["プルリクエスト"],
  "えーじぇんと":["エージェント"],"あーきてくちゃ":["アーキテクチャ"],
  "でざいんぱたーん":["デザインパターン"],
  "りふぁくたりんぐ":["リファクタリング"],"ぱいぷらいん":["パイプライン"],
  "どっかー":["Docker"],"くばねてす":["Kubernetes"],
  "せきゅりてぃ":["セキュリティ"],"とーくん":["トークン"],
  "ふろんとえんど":["フロントエンド"],"ばっくえんど":["バックエンド"],
  "すけーらびりてぃ":["スケーラビリティ"],
  "よんで":["ヨンデ"],"つんどく":["ツンドク"],"こんみゃく":["根脈"],
  "ちかとし":["地下都市"],"きんし":["菌糸"],"きんしねっと":["菌糸ネット"],
  "はっこうぶんめい":["発酵文明"],"ねんきん":["粘菌"],
  "ねんきんこんぴゅーた":["粘菌コンピュータ"],
  "じぇねれーてぃぶあーと":["ジェネレーティブアート"],
  "れとろこんぴゅーてぃんぐ":["レトロコンピューティング"],
  "ふぁみこん":["ファミコン"],"あくしょんすくりぷと":["ActionScript"],
  "らくご":["落語"],"こうだん":["講談"],"まくら":["枕"],
  "おち":["落ち","オチ"],"はなし":["話","噺"],

  "ていいかぶ":["低位株"],"すくりーにんぐ":["スクリーニング"],

  "かぶか":["株価"],"らくてん":["楽天"],"しょうけん":["証券"],

  "かいしゃ":["会社"],"しごと":["仕事"],"かいぎ":["会議"],
  "しりょう":["資料"],"ほうこく":["報告"],"れんらく":["連絡"],
  "けんとう":["検討"],"かくにん":["確認"],"ていしゅつ":["提出"],
  "しめきり":["締め切り"],"すけじゅーる":["スケジュール"],
  "みつもり":["見積もり","見積り"],"けいやく":["契約"],
  "はっちゅう":["発注"],"のうひん":["納品"],"せいきゅう":["請求"],
  "しはらい":["支払い","支払"],"よさん":["予算"],
  "こすと":["コスト"],"うりあげ":["売上","売り上げ"],
  "ひょうか":["評価"],"かいぜん":["改善"],"もんだい":["問題"],
  "かいけつ":["解決"],"ていあん":["提案"],
  "じっし":["実施"],"けっか":["結果"],
  "もくてき":["目的"],"ほうほう":["方法"],
  "じょうほう":["情報"],"でーた":["データ"],
  "ぶんせき":["分析"],"かいはつ":["開発"],
  "ぷろじぇくと":["プロジェクト"],"ちーむ":["チーム"],
  "くらいあんと":["クライアント"],
  "ゆーざー":["ユーザー","ユーザ"],
  "さーびす":["サービス"],
  "きのう":["機能","昨日"],"しすてむ":["システム"],
  "うぇぶ":["Web","ウェブ"],"あぷり":["アプリ","アプリケーション"],
  "めーる":["メール"],
  "かいとう":["回答","解答"],
  "しつもん":["質問"],"ないよう":["内容"],
  "ことば":["言葉"],"ぶんしょう":["文章"],
  "さくひん":["作品"],"ものがたり":["物語"],
  "せかい":["世界"],"じかん":["時間"],
  "にゅうりょく":["入力"],"しゅつりょく":["出力"],
  "ほぞん":["保存"],"ふぁいる":["ファイル"],
  "ふぉるだ":["フォルダ"],
  "ねっとわーく":["ネットワーク"],

};

const API_THRESHOLD = 55;
const MAX_CONTEXT = 300;

// ─── Pipeline ────────────────────────────────────────────────────────────────
const logs = [];
function log(msg) { logs.push(msg); }

function detectLang(text) {
  const hasJP  = /[\u3040-\u9FFF]/.test(text);
  const hasEN  = /[a-zA-Z]/.test(text);
  const looksRomaji = !hasJP && hasEN && /^[a-zA-Z\s']+$/.test(text.trim());
  if (looksRomaji) return { lang: "romaji",  conf: 88 };
  if (hasJP && hasEN) return { lang: "mixed",  conf: 80 };
  if (hasJP)          return { lang: "ja",     conf: 95 };
  if (hasEN)          return { lang: "en",     conf: 85 };
  return { lang: "unknown", conf: 0 };
}

function segmentedLookup(hira) {
  const tokens = hira.split(' ').filter(Boolean);
  if (tokens.length === 0) return { converted: hira, conf: 0, source: "none" };

  let sb = '', total = 0, src = 'builtin';
  for (const tok of tokens) {
    if (BUILTIN[tok]) {
      sb += BUILTIN[tok][0];
      total += 90;
      continue;
    }
    // 前方一致
    const prefix = Object.keys(BUILTIN).find(k => k.startsWith(tok) && k !== tok);
    if (prefix) {
      sb += BUILTIN[prefix][0];
      total += 65;
      continue;
    }
    sb += tok;
    total += 30;
  }
  return { converted: sb, conf: Math.floor(total / tokens.length), source: src };
}

function buildLocalCompletions(converted, lang) {
  if (['ja','romaji'].includes(lang)) {
    return [converted + "は", converted + "が", converted + "を", converted + "の"];
  }
  return [converted + ". ", converted + ", and ", converted + ", but "];
}

function pipelineRun(input) {
  logs.length = 0;
  const { lang, conf: langConf } = detectLang(input);
  log(`Lang detection: ${lang} (${langConf}%)`);

  // English → local only
  if (lang === "en") {
    log("English detected → local completions only");
    const comps = [input+". ", input+", and ", input+", but ", input+"—"];
    return { source:"local", lang:"en", confidence:langConf, converted:input, completions:comps, intent:null };
  }

  // Romaji → Hiragana
  let hira = lang === "romaji" ? toHiragana(input) : input;
  log(`Romaji conversion: "${input}" → "${hira}"`);

  // Dictionary lookup
  const { converted, conf, source } = segmentedLookup(hira);
  log(`Dictionary lookup: source=${source}, confidence=${conf}%, converted="${converted}"`);

  // Check API threshold
  if (conf >= API_THRESHOLD) {
    log(`Confidence ${conf} >= threshold ${API_THRESHOLD} → local result`);
    return { source, lang, confidence: conf, converted, completions: buildLocalCompletions(converted, lang), intent: null };
  }

  log(`Confidence ${conf} < threshold → would call Claude API (needs ANTHROPIC_API_KEY)`);
  return { source:"local-fallback", lang, confidence: conf, converted, completions: buildLocalCompletions(converted, lang), intent: null };
}

// ─── UI ──────────────────────────────────────────────────────────────────────
function setInput(v) { document.getElementById('input').value = v; }

function runPipeline() {
  const input = document.getElementById('input').value.trim();
  if (!input) return;

  const result = pipelineRun(input);
  const srcColors = { custom:"custom", builtin:"builtin", romaji:"romaji", api:"api", "local-fallback":"local", local:"local" };

  // Meta
  const metaEl = document.getElementById('meta');
  metaEl.innerHTML = `<span class="badge ${srcColors[result.source] || 'local'}">${result.source}</span>
    <span class="badge" style="background:#5a96ff;color:#fff">${
      {ja:"日本語",en:"English",romaji:"ローマ字",mixed:"混在"}[result.lang] || result.lang
    }</span>
    ${result.confidence}%`;

  // Converted
  const convEl = document.getElementById('converted');
  if (result.converted !== input && result.converted.length > 0) {
    convEl.innerHTML = `<span style="color:var(--fg-dim)">${truncate(input,24)}</span><span class="arrow">→</span><span>${truncate(result.converted,28)}</span>`;
    convEl.style.display = '';
  } else {
    convEl.style.display = 'none';
  }

  // Intent
  const intentEl = document.getElementById('intent');
  if (result.intent) {
    intentEl.textContent = '意図: ' + result.intent;
    intentEl.style.display = '';
  } else {
    intentEl.style.display = 'none';
  }

  // Completions
  const compsEl = document.getElementById('completions');
  compsEl.innerHTML = '';
  result.completions.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'c-btn';
    btn.innerHTML = `<span class="num">[${i+1}]</span>${truncate(c, 48)}`;
    btn.onclick = () => { navigator.clipboard.writeText(c); flash(`Copied: ${c}`); };
    compsEl.appendChild(btn);
  });

  document.getElementById('result').classList.add('visible');
}

function truncate(s, n) { return s.length <= n ? s : s.slice(0, n) + '…'; }

function flash(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#30446c;color:#fff;padding:8px 16px;border-radius:6px;font-size:13px;z-index:999';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function showLog() {
  const box = document.getElementById('logBox');
  box.classList.toggle('visible');
  if (box.classList.contains('visible')) {
    box.textContent = logs.join('\n') || '(run the pipeline first to see logs)';
  }
}

// Auto-run on input
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runPipeline(); }
});
</script>
</body>
</html>
